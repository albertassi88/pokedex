<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <img src="assets/logo.png" class="logo" alt="Logo Pokedex">

        <nav class="nav">
            <span class="nav-item-home">Home</span>
            <span class="nav-item">Pokédex</span>
        </nav>
    </header>

    <section class="search-area">
        <div class="search-box">
            <input type="text" id="search" placeholder="Faça uma busca pelo nome do pokémon" />            
            <img src="assets/icon.png" class="icon" />
        </div>
    </section>

    <main>
        <div id="pokemon-list" class="pokemon-grid"></div>

        <div class="pagination">
            <button id="prev">
                <img src="assets/arrow-left.png" class="arrow-left"/> 
            Anterior</button>

            <div class="pages">
                <span class="active">1</span>
                <span>2</span>
                <span>3</span>
            </div>

            <button id="next">Próximo
                <img src="assets/arrow-right.png" class="arrow-right"/>
            </button>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>

</body>
</html>
